[mypy]
python_version = 3.12
# Dritt-Libs ohne Stubs (flask/drafthorse/lxml/weasyprint/saxonche/webview/cffi)
# werden als Any behandelt – wir prüfen nur unseren eigenen Code.
ignore_missing_imports = True
# auch Funktionskörper ohne Annotation prüfen (fängt echte Typfehler zusätzlich)
check_untyped_defs = True
warn_redundant_casts = True
warn_unused_ignores = True
