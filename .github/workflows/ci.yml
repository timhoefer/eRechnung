name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install test dependencies
        # Die Test-Suite ruft weder build_pdf (WeasyPrint/Pango) noch die
        # Schematron-Prüfung (SaxonC) auf – die nativen Libs sind nur zur
        # Laufzeit nötig. Für die Tests genügen Flask + drafthorse (+ lxml) + pytest.
        run: |
          python -m pip install --upgrade pip
          pip install flask==3.1.3 drafthorse==2025.2.0 pytest==9.0.3

      - name: Run tests
        run: pytest -q

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Ruff
        run: |
          pip install ruff==0.15.16
          ruff check --output-format=github .

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: mypy
        # ignore_missing_imports (mypy.ini) -> Dritt-Libs müssen nicht installiert sein.
        run: |
          pip install mypy==2.1.0
          mypy app.py zugferd.py i18n.py countries.py desktop.py

  js:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Syntax-Check
        run: node --check static/calc.js && node --check static/app.js
      - name: JS-Tests (Rechenlogik)
        run: node --test tests/calc.test.js
