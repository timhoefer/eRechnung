name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install test dependencies
        # Die Test-Suite ruft weder build_pdf (WeasyPrint/Pango) noch die
        # Schematron-Prüfung (SaxonC) auf – die nativen Libs sind nur zur
        # Laufzeit nötig. Für die Tests genügen Flask + drafthorse (+ lxml) + pytest.
        run: |
          python -m pip install --upgrade pip
          pip install flask==3.1.3 drafthorse==2025.2.0 pytest==9.0.3

      - name: Run tests
        run: pytest -q

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Ruff (advisory)
        continue-on-error: true
        run: |
          pip install ruff
          ruff check --output-format=github .
